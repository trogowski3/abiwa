events {}

http {
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=stats_cache:10m max_size=50m inactive=60s;

  server {
    listen 80;

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }

    location /api/ {
      proxy_pass http://backend:3000/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # cache tylko stats
      location /api/stats {
        proxy_pass http://backend:3000/stats;

        proxy_cache stats_cache;
        proxy_cache_valid 200 30s;

        add_header X-Cache-Status $upstream_cache_status;
      }
    }
  }
}
