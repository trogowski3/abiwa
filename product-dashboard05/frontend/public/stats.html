<!DOCTYPE html>
<html>
<head>
  <title>Stats</title>
</head>
<body>
  <h1>Stats</h1>
  <div id="stats"></div>

  <script>
    fetch('/api/stats')
      .then(r => r.json())
      .then(data => {
        document.getElementById('stats').innerText =
          `Products: ${data.count}, Instance: ${data.instance}`;
      });
  </script>
</body>
</html>
