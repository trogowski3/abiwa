events {}

http {
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=stats_cache:10m max_size=10m inactive=60s;

  upstream backend_cluster {
    server api-a:3000;
    server api-b:3000;
  }

  server {
    listen 80;

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }

    location /api/ {
      proxy_pass http://backend_cluster/;
    }

    location /api/stats {
      proxy_pass http://backend_cluster/stats;

      proxy_cache stats_cache;
      proxy_cache_valid 200 30s;

      proxy_cache_bypass $http_cache_control;

      add_header X-Cache-Status $upstream_cache_status;
    }
  }
}
